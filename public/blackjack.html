<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackjack</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body class="blackjack-page">

  <div id="dealer-section">
    <div class="section-label">DEALER</div>
    <div class="dealer-info">
      <span id="dealer-sum-display" class="sum-badge">?</span>
      <span id="dealer-status-display" class="status-tag"></span>
    </div>
    <div id="dealer-cards" class="cards-row"></div>
  </div>

  <div id="players-row"></div>

  <div id="game-bottom">
    <div id="game-controls">
      <button id="btn-hit"       class="game-btn" disabled>Hit</button>
      <button id="btn-stand"     class="game-btn" disabled>Stand</button>
      <button id="btn-double"    class="game-btn" disabled>Double</button>
      <button id="btn-split"     class="game-btn" disabled>Split</button>
      <button id="btn-new-round" class="game-btn new-round-btn" disabled>New Round</button>
      <button id="btn-exit-game" class="game-btn exit-btn">Exit</button>
    </div>
  </div>

  <div id="game-info-panel">
    <div id="turn-indicator" class="turn-indicator"></div>
    <div id="round-results-panel" class="results-panel"></div>
    <div id="my-stats-panel" class="stats-panel"></div>
  </div>

  <div id="toast" class="toast" style="display:none"></div>

  <script src="./js/cards.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/game.js"></script>
</body>
</html>
