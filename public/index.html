<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackjack</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body class="index-page">
  <div class="index-overlay"></div>

  <div class="index-container">
    <div class="join-card">
      <div class="join-header">
        <span class="suits-row">♠ ♥ ♣ ♦</span>
        <h2>Blackjack</h2>
      </div>

      <div class="form-group">
        <label for="player-name-input">Your Name</label>
        <input type="text" id="player-name-input" placeholder="Enter your name..." maxlength="18" autocomplete="off">
      </div>

      <div class="join-divider"><span>What do you want to do?</span></div>

      <button id="btn-create-room" class="menu-btn primary-btn full-width">Create New Room</button>

      <div class="join-or">— or join existing —</div>

      <div class="join-row">
        <input type="text" id="room-code-input" placeholder="Room code" maxlength="6" autocomplete="off">
        <button id="btn-join-room" class="menu-btn secondary-btn">Join</button>
      </div>

      <div id="join-error" class="error-msg" style="display:none"></div>

      <a href="./instructions.html" class="back-link">How to play</a>
    </div>
  </div>

  <script src="./js/cards.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/index.js"></script>
</body>
</html>
